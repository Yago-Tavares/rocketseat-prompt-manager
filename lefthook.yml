pre-commit:
  commands:
    check:
      run: npm run format {staged_files}
      glob: "*.{js,ts,jsx,tsx}"
      staged_fixes: true

pre-push:
  commands:
    validate:
      glob: "*.{ts,tsx}"
      run: npm run typecheck
    lint:
      glob: "*.{ts,tsx}"
      run: npm run lint
    test:
      glob: "*.{ts,tsx}"
      run: npm run test:coverage
